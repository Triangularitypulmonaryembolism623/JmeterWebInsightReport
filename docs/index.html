<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Insight Report — Documentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #3b82f6;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #3b82f6;
      --sidebar-nav-link-font-weight--active: 700;
    }
    .sidebar-nav > ul > li > a { font-weight: 600; }
    .markdown-section img { max-width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; margin: 12px 0; }
    .markdown-section table { border-collapse: collapse; width: 100%; }
    .markdown-section th { background: #f8fafc; }
    .markdown-section th, .markdown-section td { border: 1px solid #e5e7eb; padding: 8px 12px; }
    .markdown-section code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; }
    .markdown-section pre code { background: none; padding: 0; }
    .app-name-link { font-size: 1.1rem !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Web Insight Report',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      basePath: '/JmeterWebInsightReport/docs/',
      homepage: 'Tutorial/README.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 3,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-properties.min.js"></script>
</body>
</html>
