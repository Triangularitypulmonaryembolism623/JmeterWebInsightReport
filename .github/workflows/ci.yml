name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 11, 17 ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload JAR
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-web-insight-report
          path: jmeter-web-insight-report/target/jmeter-web-insight-report-*.jar
          if-no-files-found: error
